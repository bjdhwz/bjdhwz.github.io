<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>GLSL expressions toy</title>
  <style>
    html,body { height:100%; margin:0; display:flex; align-items:top; justify-content:center; font-family: monospace; font-size: 15px; }
    canvas { width:768px; height:768px; image-rendering:pixelated; border:2px #000 solid; padding:2px; }
    input { width:640px; }
    .alert-danger {
      color: #721c24;
      background-color: #f8d7da;
      margin-top: 1rem;
      padding: .75rem 1.25rem;
      border: 1px solid #f5c6cb;
      border-radius: .25rem;
      width: 736px;
    }
  </style>

<body>
  <div>
  <canvas id="gl" width="768" height="768"></canvas>
  <br>
  <div style="display: flex; margin-bottom: 6px;">
    <output id="scale-value" style="width: 64px; text-align: center;">6</output>
    <input type="range" id="scale" min="0" max="11" value="4" step="1" style="width: 708px;" oninput="
      scale = ['1.', '2.', '3.', '4.', '6.', '8.', '12.', '16.', '24.', '32.', '48.', '64.'][this.value];
      document.getElementById('scale-value').value = scale.replace('.', '');
      draw();">
  </div>
  <input type="text" id="expression" value="cos(float(int(x) ^ int(y))) * 256.0"></input>
  <input type="button" onclick="expression = document.getElementById('expression').value; draw();" value="=" style="width: 120px; cursor: pointer;" title="">
  <div class="alert-danger" style="display: none;" id="exception"></div>
  </div>
  <script type="application/javascript">
    window.addEventListener('error', function (ev) {
      try {
        document.getElementById('exception').style.display = "block";
        document.getElementById('exception').innerHTML = ev.message;
      } catch (e) {}
    });

    const canvas = document.getElementById('gl');
    const gl = canvas.getContext('webgl2');
    if (!gl) throw new Error('WebGL2 not supported');

    var expression = "cos(float(int(x) ^ int(y))) * 256.0";
    var scale = "6.";

    function draw() {

    document.getElementById('exception').style.display = "none";

    // Vertex shader (full-screen triangle)
    const vsSource = `#version 300 es
    precision highp float;
    const vec2 verts[3] = vec2[3](
      vec2(-1.0, -1.0),
      vec2( 3.0, -1.0),
      vec2(-1.0,  3.0)
    );
    out vec2 v_uv;
    void main() {
      vec2 pos = verts[gl_VertexID];
      v_uv = pos * 0.5 + 0.5;
      gl_Position = vec4(pos, 0.0, 1.0);
    }`;

    // Fragment shader: background = vec3(x, y, 0.5)
    var fsSource = `#version 300 es
    precision highp float;
    in vec2 v_uv;
    out vec4 outColor;
    uniform vec3 palette[256];
    void main() {
      float x = round((gl_FragCoord.x - 384. - ${scale} / 2.) / ${scale});
      float y = round((gl_FragCoord.y - 384. - ${scale} / 2.) / ${scale});
      int i = int(${expression}) % 256;
      outColor = vec4(palette[i] / 256., 1.0);
    }`;

    function compile(type, src) {
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        throw new Error(gl.getShaderInfoLog(s));
      }
      return s;
    }

    const vs = compile(gl.VERTEX_SHADER, vsSource);
    const fs = compile(gl.FRAGMENT_SHADER, fsSource);
    const prog = gl.createProgram();
    gl.attachShader(prog, vs);
    gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
      throw new Error(gl.getProgramInfoLog(prog));
    }

    const paletteLocation = gl.getUniformLocation(prog, "palette");

    const paletteData = new Float32Array([

      148, 122, 109, 163, 99, 54, 231, 148, 96, 125, 83, 44, 199, 133, 80, 152, 95, 42, 225, 166, 121, 133, 91, 50, 252, 159, 77, 255, 186, 132, 233, 139, 42, 233, 163, 104, 177, 120, 68, 150, 99, 46, 202, 122, 44, 67, 52, 27,

      209, 152, 38, 221, 165, 45, 201, 152, 51, 249, 191, 69, 220, 184, 121, 186, 145, 50, 232, 182, 71, 247, 194, 66, 125, 108, 70, 218, 201, 166, 250, 214, 137, 217, 171, 66, 246, 197, 85, 255, 196, 8, 239, 187, 36, 202, 173, 95,

      190, 194, 63, 108, 106, 45, 147, 150, 80, 131, 138, 45, 177, 180, 121, 97, 97, 56, 75, 78, 42, 91, 98, 46, 77, 81, 57, 137, 145, 107, 144, 180, 75, 145, 173, 112, 181, 202, 160, 100, 106, 88, 123, 162, 63, 134, 193, 102,

      81, 168, 221, 46, 169, 223, 11, 16, 19, 15, 37, 64, 8, 25, 45, 0, 92, 175, 11, 52, 110, 123, 144, 210, 110, 117, 164, 38, 30, 71, 17, 50, 133, 78, 79, 151, 33, 30, 85, 139, 129, 195, 112, 100, 154, 155, 144, 194,

      83, 89, 83, 79, 79, 72, 82, 67, 61, 55, 60, 56, 58, 50, 38, 238, 238, 238, 221, 221, 221, 187, 187, 187, 170, 170, 170, 136, 136, 136, 119, 119, 119, 85, 85, 85, 68, 68, 68, 34, 34, 34, 17, 17, 17, 0, 0, 0,

    // Upload the uniform array
    gl.useProgram(prog);
    gl.uniform3fv(paletteLocation, paletteData);
    gl.viewport(0, 0, gl.drawingBufferWidth, gl.drawingBufferHeight);
    gl.drawArrays(gl.TRIANGLES, 0, 3);

    }

draw();

  </script>
</body>
</html>
